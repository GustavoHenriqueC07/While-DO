<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Produto</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container{
    background-color: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    width: 300px;
    text-align: center;
}
input{
    width: 90%;
    padding: 10px;
    margin: 15px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button{
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    background-color: #007bff;
    color: white;
    cursor: pointer;
}

button:hover{
    background-color: #0056b3;
}
#mensagem{
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
<h1>Cadastro de Produto</h1>

<input type="text" id="produto" placeholder="Digite o nome do produto">

<button onclick="cadastrarProduto()">
    Cadastrar
</button>

<p id="mensagem"></p>
</div>

<script src="script.js"></script>
